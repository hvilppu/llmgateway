# Provisioi Azure-infrastruktuuri Bicep-templatella.
# Luo kaiken yhdellä ajolla: App Service, Azure OpenAI, Cosmos DB, SQL Server, SyncFunction.
# Ajetaan manuaalisesti kun infraa muutetaan — ei automaattisesti.
#
# Vaadittavat GitHub-asetukset:
#   Secrets : AZURE_CLIENT_ID              (service principal / OIDC)
#             AZURE_TENANT_ID
#             AZURE_SUBSCRIPTION_ID
#             GATEWAY_API_KEY             (X-Api-Key -headerin arvo)
#             AZURE_SQL_ADMIN_PASSWORD    (MS SQL -ylläpitäjän salasana)
#   Variables: AZURE_RESOURCE_GROUP       (esim. rg-llmgateway-prod)
#              AZURE_COSMOS_ACCOUNT_NAME  (esim. heikkis-cosmos-prod)
#
# Azure OpenAI API-avain ja Cosmos DB connection string luetaan automaattisesti
# Bicepissä luoduista resursseista — erillisiä secretejä ei tarvita.

name: Provision Infrastructure

on:
  workflow_dispatch:

permissions:
  id-token: write   # OIDC-kirjautumista varten
  contents: read

jobs:
  provision:
    name: Deploy Bicep
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Login to Azure (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Create resource group (if not exists)
        run: |
          az group create \
            --name ${{ vars.AZURE_RESOURCE_GROUP }} \
            --location swedencentral \
            --output none

      - name: Enable Cosmos DB Vector Search capability
        run: |
          # Aktivoidaan capability ennen Bicep-deploymenttia — voi kestää jopa 15 min.
          # Epäonnistuu hiljaisesti jos tiliä ei ole vielä olemassa (ensimmäinen ajo).
          az cosmosdb update \
            --resource-group "${{ vars.AZURE_RESOURCE_GROUP }}" \
            --name "${{ vars.AZURE_COSMOS_ACCOUNT_NAME }}" \
            --capabilities EnableNoSQLVectorSearch \
            --output none 2>/dev/null \
            && echo "Odotetaan 120 s capabilityn aktivoitumista..." && sleep 120 \
            || echo "Cosmos-tiliä ei löydy tai capability jo aktiivinen — jatketaan."

      - name: Deploy Bicep
        run: |
          az deployment group create \
            --resource-group "${{ vars.AZURE_RESOURCE_GROUP }}" \
            --template-file infra/main.bicep \
            --parameters infra/main.bicepparam \
            --parameters "gatewayApiKey=${{ secrets.GATEWAY_API_KEY }}" \
            --parameters "sqlAdminPassword=${{ secrets.AZURE_SQL_ADMIN_PASSWORD }}" \
            --output table

      - name: Show URLs
        run: |
          az deployment group show \
            --resource-group ${{ vars.AZURE_RESOURCE_GROUP }} \
            --name main \
            --query "{appUrl: properties.outputs.appUrl.value, functionUrl: properties.outputs.functionAppUrl.value}" \
            --output table
