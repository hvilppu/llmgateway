# Provisioi Azure-infrastruktuuri Bicep-templatella.
# Luo kaiken yhdellä ajolla: App Service, Azure OpenAI, Cosmos DB, SQL Server, SyncFunction.
# Ajetaan manuaalisesti kun infraa muutetaan — ei automaattisesti.
#
# Vaadittavat GitHub-asetukset:
#   Secrets : AZURE_CLIENT_ID              (service principal / OIDC)
#             AZURE_TENANT_ID
#             AZURE_SUBSCRIPTION_ID
#             GATEWAY_API_KEY             (X-Api-Key -headerin arvo)
#             AZURE_SQL_ADMIN_PASSWORD    (MS SQL -ylläpitäjän salasana)
#   Variables: AZURE_RESOURCE_GROUP  (esim. rg-llmgateway-prod)
#
# Azure OpenAI API-avain ja Cosmos DB connection string luetaan automaattisesti
# Bicepissä luoduista resursseista — erillisiä secretejä ei tarvita.

name: Provision Infrastructure

on:
  workflow_dispatch:

permissions:
  id-token: write   # OIDC-kirjautumista varten
  contents: read

jobs:
  provision:
    name: Deploy Bicep
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Login to Azure (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Create resource group (if not exists)
        run: |
          az group create \
            --name ${{ vars.AZURE_RESOURCE_GROUP }} \
            --location swedencentral \
            --output none

      # Vaihe 1: Luo kaikki resurssit PAITSI vektori-container.
      # Cosmos-tili luodaan tässä vaiheessa capabilities-kentällä,
      # mutta container odottaa vaiheeseen 3.
      - name: Deploy Bicep (vaihe 1 — ilman vector-containeria)
        run: |
          az deployment group create \
            --resource-group "${{ vars.AZURE_RESOURCE_GROUP }}" \
            --template-file infra/main.bicep \
            --parameters infra/main.bicepparam \
            --parameters "gatewayApiKey=${{ secrets.GATEWAY_API_KEY }}" \
            --parameters "sqlAdminPassword=${{ secrets.AZURE_SQL_ADMIN_PASSWORD }}" \
            --parameters "deployVectorContainer=false" \
            --name main-phase1 \
            --output table

      # Vaihe 2: Aktivoi capability CLI:llä ja odota että se ehtii propagoitua.
      # Dokumentaation mukaan voi kestää jopa 15 min — odotetaan 180 s varmuuden vuoksi.
      - name: Aktivoi Cosmos DB Vector Search ja odota
        run: |
          COSMOS_NAME=$(az cosmosdb list \
            --resource-group "${{ vars.AZURE_RESOURCE_GROUP }}" \
            --query "[0].name" -o tsv)
          echo "Cosmos-tili: $COSMOS_NAME"
          az cosmosdb update \
            --resource-group "${{ vars.AZURE_RESOURCE_GROUP }}" \
            --name "$COSMOS_NAME" \
            --capabilities EnableNoSQLVectorSearch \
            --output none
          echo "Capability aktivoitu. Odotetaan 180 sekuntia propagoitumista..."
          sleep 180

      # Vaihe 3: Luo vektori-container nyt kun capability on varmasti aktiivinen.
      - name: Deploy Bicep (vaihe 2 — vector-container)
        run: |
          az deployment group create \
            --resource-group "${{ vars.AZURE_RESOURCE_GROUP }}" \
            --template-file infra/main.bicep \
            --parameters infra/main.bicepparam \
            --parameters "gatewayApiKey=${{ secrets.GATEWAY_API_KEY }}" \
            --parameters "sqlAdminPassword=${{ secrets.AZURE_SQL_ADMIN_PASSWORD }}" \
            --parameters "deployVectorContainer=true" \
            --name main-phase2 \
            --output table

      - name: Show URLs
        run: |
          az deployment group show \
            --resource-group ${{ vars.AZURE_RESOURCE_GROUP }} \
            --name main-phase2 \
            --query "{appUrl: properties.outputs.appUrl.value, functionUrl: properties.outputs.functionAppUrl.value}" \
            --output table
